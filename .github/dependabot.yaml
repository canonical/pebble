version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"  # This is hard-coded to the 1st of the month
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0  # Security updates only
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
